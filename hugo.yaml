baseURL: "https://hanxin-blog.pages.dev"
languageCode: zh-cn
title: "寒心的角落"
theme: PaperMod

pagination:
  pagerSize: 10

enableRobotsTXT: true
enableEmoji: true

menu:
  main:
    - identifier: posts
      name: 博客
      url: /posts/
      weight: 10
    - identifier: wiki
      name: 知识库
      url: /wiki/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40

params:
  env: production
  description: "写想法，存知识"
  author: 寒心
  dateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  profileMode:
    enabled: true
    title: "寒心"
    subtitle: "写想法，存知识。一只恐龙虾的个人小站"
    buttons:
      - name: 博客
        url: /posts/
      - name: 知识库
        url: /wiki/

  socialIcons:
    - name: github
      url: "https://github.com/inhereyes"
    - name: email
      url: "mailto:hi@hanxin-blog.pages.dev"
    - name: rss
      url: /index.xml

  ShowReadingTime: true
  ShowWordCount: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowShareButtons: false
  hideSummary: false
  showtoc: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
