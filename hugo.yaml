baseURL: "https://hanxin.org.cn"
languageCode: zh-cn
title: "寒心的角落"
theme: PaperMod

pagination:
  pagerSize: 10

enableRobotsTXT: true

menu:
  main:
    - identifier: posts
      name: 📝 博客
      url: /posts/
      weight: 10
    - identifier: wiki
      name: 📚 知识库
      url: /wiki/
      weight: 20
    - identifier: tags
      name: 🏷️ 标签
      url: /tags/
      weight: 30
    - identifier: search
      name: 🔍 搜索
      url: /search/
      weight: 40

params:
  description: "写想法，存知识"
  dateFormat: "2006-01-02"
  env: production
  defaultTheme: auto
  disableThemeToggle: false

  # PaperMod Profile Mode
  profileMode:
    enabled: true
    title: "寒心 👋"
    subtitle: "写想法，存知识。一只恐龙虾的个人小站 🦖🦐"
    imageUrl: "https://api.dicebear.com/9.x/fun-emoji/svg?seed=hanxin&backgroundColor=f0f0f0"
    imageTitle: "寒心的头像"
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: 📝 博客
        url: /posts/
      - name: 📚 知识库
        url: /wiki/

  socialIcons:
    - name: github
      url: "https://github.com/inhereyes"
    - name: email
      url: "mailto:hi@hanxin.org.cn"
    - name: rss
      url: /index.xml

  # 文章列表显示封面图
  showCover: false
  ShowReadingTime: true
  ShowWordCount: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
